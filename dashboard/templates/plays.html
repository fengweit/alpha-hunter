<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alpha Hunter — Plays</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0b0f1a; --bg2: #0f1520; --bg3: #131c2e; --bg4: #1a2340;
      --border:  #1e2d45; --border2: #263550;
      --text:    #cdd9f0; --text2: #7a90b0; --text3: #3d5070;
      --gold:    #f0c040; --green: #34d399; --red: #f87171;
      --orange:  #fb923c; --blue: #60a5fa; --purple: #a78bfa;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 13px; }

    /* NAV */
    header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; height: 52px;
      background: var(--bg2); border-bottom: 1px solid var(--border);
    }
    .logo { font-weight: 700; font-size: 15px; }
    .logo span { color: var(--gold); }
    .nav-links { display: flex; gap: 4px; }
    .nav-link {
      padding: 5px 14px; border-radius: 6px; font-size: 12px;
      text-decoration: none; color: var(--text2);
      transition: all .15s;
    }
    .nav-link:hover, .nav-link.active { background: var(--bg4); color: var(--text); }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .btn {
      padding: 5px 14px; border-radius: 6px; font-size: 11px; cursor: pointer;
      border: 1px solid var(--border2); background: var(--bg4); color: var(--text2);
      transition: all .15s; font-family: inherit;
    }
    .btn:hover { border-color: var(--gold); color: var(--gold); }
    .btn-primary { background: rgba(52,211,153,.12); border-color: rgba(52,211,153,.3); color: var(--green); }
    .btn-primary:hover { background: rgba(52,211,153,.2); }

    /* STATS */
    .stats-bar { display: flex; gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
    .stat-item { flex:1; padding: 12px 20px; background: var(--bg2); }
    .stat-val { font-size: 22px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .stat-val.pos { color: var(--green); }
    .stat-val.neg { color: var(--red); }
    .stat-val.gold { color: var(--gold); }
    .stat-val.blue { color: var(--blue); }
    .stat-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .8px; color: var(--text3); margin-top: 2px; }

    /* MAIN */
    .main { padding: 24px 28px; max-width: 1400px; margin: 0 auto; }
    .section-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text3);
      margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
    }
    .section-label::after { content:''; flex:1; height:1px; background:var(--border); }

    /* THEME CARDS */
    .themes-list { display: flex; flex-direction: column; gap: 16px; }

    .theme-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden; transition: border-color .2s;
    }
    .theme-card:hover { border-color: var(--border2); }
    .theme-card.status-active   { border-left: 3px solid var(--green); }
    .theme-card.status-building { border-left: 3px solid var(--gold); }
    .theme-card.status-watching { border-left: 3px solid var(--border2); }
    .theme-card.status-exiting  { border-left: 3px solid var(--orange); }
    .theme-card.status-closed   { border-left: 3px solid #374151; opacity: .6; }

    .theme-head {
      display: grid; grid-template-columns: 1fr auto;
      padding: 18px 20px 14px; gap: 20px; align-items: start;
    }
    .theme-name { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .theme-layers { display: flex; flex-direction: column; gap: 3px; margin-bottom: 10px; }
    .theme-layer { display: grid; grid-template-columns: 22px 1fr; gap: 8px; font-size: 11px; align-items: baseline; }
    .l-badge { font-size: 9px; font-weight: 700; padding: 1px 0; text-align: center;
               border-radius: 3px; font-family: 'JetBrains Mono', monospace; }
    .l-a { background: rgba(96,165,250,.15); color: var(--blue); }
    .l-b { background: rgba(107,114,128,.1);  color: #4b5563; }
    .l-b-text { color: #4b5563; text-decoration: line-through; }
    .l-c { background: rgba(52,211,153,.15); color: var(--green); }
    .l-c-text { color: var(--green); font-weight: 500; }

    .theme-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .status-badge {
      font-size: 10px; font-weight: 600; padding: 2px 9px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .sb-watching { background: var(--bg4); color: var(--text3); }
    .sb-building { background: rgba(240,192,64,.1); color: var(--gold); }
    .sb-active   { background: rgba(52,211,153,.1); color: var(--green); }
    .sb-exiting  { background: rgba(251,146,60,.1); color: var(--orange); }
    .sb-closed   { background: rgba(107,114,128,.1); color: #6b7280; }
    .theme-date { font-size: 10px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }

    /* Conviction */
    .conviction-block { text-align: right; min-width: 80px; }
    .conviction-num { font-size: 32px; font-weight: 700; font-family: 'JetBrains Mono', monospace; line-height: 1; }
    .conviction-lbl { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; }
    .conv-bar { height: 2px; background: var(--bg4); border-radius: 1px; margin: 6px 0 0; overflow: hidden; }
    .conv-fill { height: 100%; border-radius: 1px; transition: width .8s ease; background: var(--green); }

    /* Positions table */
    .positions-section { border-top: 1px solid var(--border); }
    .positions-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px; cursor: pointer; color: var(--text2); font-size: 11px;
      user-select: none;
    }
    .positions-header:hover { color: var(--text); }
    .pos-summary { display: flex; gap: 16px; align-items: center; }
    .pos-count { font-family: 'JetBrains Mono', monospace; }

    .pnl { font-weight: 600; font-family: 'JetBrains Mono', monospace; }
    .pnl.pos { color: var(--green); }
    .pnl.neg { color: var(--red); }

    .positions-body { display: none; }
    .positions-body.open { display: block; }

    /* Positions table */
    .pos-table { width: 100%; border-collapse: collapse; }
    .pos-table th {
      font-size: 9px; text-transform: uppercase; letter-spacing: .7px; color: var(--text3);
      padding: 8px 20px; text-align: left; border-bottom: 1px solid var(--border);
      background: var(--bg3);
    }
    .pos-table td {
      padding: 10px 20px; border-bottom: 1px solid var(--border);
      font-size: 12px; vertical-align: middle;
    }
    .pos-table tr:last-child td { border-bottom: none; }
    .pos-table tr:hover td { background: var(--bg3); }

    .ticker-cell { font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--green); }
    .layer-cell { font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 3px;
                  background: rgba(52,211,153,.1); color: var(--green); }
    .status-cell { font-size: 10px; color: var(--text3); }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .text2 { color: var(--text2); }
    .text3 { color: var(--text3); font-size: 11px; }

    /* Timeline */
    .timeline-section { border-top: 1px solid var(--border); padding: 14px 20px; }
    .timeline-list { display: flex; flex-direction: column; gap: 0; }
    .tl-item { display: grid; grid-template-columns: 80px 12px 1fr; gap: 12px; align-items: start; padding: 6px 0; }
    .tl-time { font-size: 10px; color: var(--text3); font-family: 'JetBrains Mono', monospace; text-align: right; padding-top: 2px; }
    .tl-dot { width: 12px; height: 12px; border-radius: 50%; margin-top: 2px; flex-shrink: 0; }
    .tl-dot.buy     { background: var(--green); }
    .tl-dot.sell    { background: var(--red); }
    .tl-dot.add     { background: var(--blue); }
    .tl-dot.trim    { background: var(--orange); }
    .tl-dot.signal  { background: var(--purple); }
    .tl-dot.watchlist { background: var(--text3); }
    .tl-dot.thesis_update { background: var(--gold); }
    .tl-dot.milestone { background: var(--gold); }
    .tl-content {}
    .tl-title { font-size: 12px; font-weight: 500; color: var(--text); }
    .tl-desc  { font-size: 11px; color: var(--text2); margin-top: 2px; }

    /* Empty */
    .empty { text-align: center; padding: 60px; color: var(--text3); }
    .empty h3 { color: var(--text2); margin-bottom: 8px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo"><span>Alpha</span>Hunter</div>
  <div class="nav-links">
    <a href="/" class="nav-link">🎯 Theses</a>
    <a href="/plays" class="nav-link active">📋 Plays</a>
  </div>
  <div class="header-right">
    <span id="last-update" style="font-size:11px;color:var(--text3)">—</span>
    <button class="btn" onclick="refreshPrices()">↻ Prices</button>
    <button class="btn btn-primary" onclick="showAddTheme()">+ New Theme</button>
  </div>
</header>

<!-- Stats -->
<div class="stats-bar">
  <div class="stat-item"><div class="stat-val blue" id="s-themes">—</div><div class="stat-lbl">Active Themes</div></div>
  <div class="stat-item"><div class="stat-val" id="s-positions">—</div><div class="stat-lbl">Open Positions</div></div>
  <div class="stat-item"><div class="stat-val gold" id="s-invested">—</div><div class="stat-lbl">Total Invested</div></div>
  <div class="stat-item"><div class="stat-val" id="s-unrealized">—</div><div class="stat-lbl">Unrealized P&L</div></div>
  <div class="stat-item"><div class="stat-val" id="s-realized">—</div><div class="stat-lbl">Realized P&L</div></div>
</div>

<!-- Main -->
<div class="main">
  <div class="section-label">Themed Plays</div>
  <div class="themes-list" id="themes-list">
    <div class="empty"><h3>No themes yet</h3><p>Click "+ New Theme" to track your first macro play</p></div>
  </div>
</div>

<!-- Add Theme Modal -->
<div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center">
  <div style="background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:28px;width:560px;max-width:95vw">
    <h3 style="margin-bottom:20px;color:var(--text)">New Themed Play</h3>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div>
        <label style="font-size:10px;text-transform:uppercase;color:var(--text3);letter-spacing:.7px">Theme Name</label>
        <input id="f-name" type="text" placeholder="e.g. Rare Earth Supply Crunch" style="width:100%;margin-top:4px;padding:9px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:inherit;font-size:13px;outline:none">
      </div>
      <div>
        <label style="font-size:10px;text-transform:uppercase;color:var(--text3);letter-spacing:.7px">[A] Macro Trigger</label>
        <input id="f-a" type="text" placeholder="Trump announces tariffs on China" style="width:100%;margin-top:4px;padding:9px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:inherit;font-size:13px;outline:none">
      </div>
      <div>
        <label style="font-size:10px;text-transform:uppercase;color:var(--text3);letter-spacing:.7px">[B] Consensus Play (skip)</label>
        <input id="f-b" type="text" placeholder="Gold, CHF, safe havens (already priced in)" style="width:100%;margin-top:4px;padding:9px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:inherit;font-size:13px;outline:none">
      </div>
      <div>
        <label style="font-size:10px;text-transform:uppercase;color:var(--text3);letter-spacing:.7px">[C] The Real Play — cheap & ignored</label>
        <textarea id="f-c" placeholder="US rare earth processors — MP, UUUU — beneficiaries of China retaliation, currently ignored and near 52w lows" rows="3" style="width:100%;margin-top:4px;padding:9px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:inherit;font-size:13px;outline:none;resize:vertical"></textarea>
      </div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:20px">
      <button class="btn" onclick="hideModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createTheme()">Create Theme</button>
    </div>
  </div>
</div>

<script>
function fmt$(n) {
  if (!n && n !== 0) return '—';
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '+';
  if (abs >= 1000000) return sign + '$' + (abs/1000000).toFixed(1) + 'M';
  if (abs >= 1000) return sign + '$' + (abs/1000).toFixed(1) + 'K';
  return (n < 0 ? '-$' : '$') + abs.toFixed(0);
}
function fmtPct(n) { if (!n && n !== 0) return '—'; return (n >= 0 ? '+' : '') + n.toFixed(1) + '%'; }
function ago(str) {
  if (!str) return '—';
  const d = new Date(str.includes('Z')||str.includes('+') ? str : str+'Z');
  const s = Math.floor((Date.now()-d)/1000);
  if (s < 60) return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  if (s < 86400) return `${Math.floor(s/3600)}h ago`;
  return str.slice(0,10);
}
function dotCls(type) {
  const m = {buy:'buy',sell:'sell',add:'add',trim:'trim',signal:'signal',
             watchlist:'watchlist',thesis_update:'thesis_update',milestone:'milestone'};
  return m[type] || 'watchlist';
}

function posRow(p) {
  const pnlVal = p.unrealized_pnl || 0;
  const pnlPct = p.unrealized_pct || 0;
  const pnlCls = pnlVal >= 0 ? 'pos' : 'neg';
  return `
  <tr>
    <td><span class="ticker-cell">${p.ticker}</span><div class="text3" style="margin-top:2px">${p.name||''}</div></td>
    <td><span class="layer-cell">${p.layer||'C'}</span></td>
    <td><span class="status-cell">${p.status}</span></td>
    <td class="mono">${p.total_shares ? p.total_shares.toLocaleString() : '—'}</td>
    <td class="mono">$${(p.avg_entry_price||0).toFixed(2)}</td>
    <td class="mono">${p.current_price ? '$'+p.current_price.toFixed(2) : '—'}</td>
    <td class="mono pnl ${pnlCls}">${fmt$(pnlVal)}<div style="font-size:10px">${fmtPct(pnlPct)}</div></td>
    <td class="mono text2">$${(p.total_cost||0).toLocaleString()}</td>
    <td class="text3">${p.entry_thesis ? p.entry_thesis.slice(0,60)+'…' : '—'}</td>
  </tr>`;
}

function themeCard(t) {
  const positions = t.positions || [];
  const timeline  = t.timeline || [];
  const invested  = t.total_invested || 0;
  const unreal    = t.total_unrealized || 0;
  const realized  = t.total_realized || 0;
  const totalPnl  = unreal + realized;
  const pnlCls    = totalPnl >= 0 ? 'pos' : 'neg';
  const convCls   = t.conviction >= 65 ? 'var(--red)' : t.conviction >= 40 ? 'var(--orange)' : t.conviction >= 20 ? 'var(--gold)' : 'var(--text3)';

  const layerRows = [
    t.layer_a ? `<div class="theme-layer"><span class="l-badge l-a">A</span><span class="text2">${t.layer_a.slice(0,100)}</span></div>` : '',
    t.layer_b ? `<div class="theme-layer"><span class="l-badge l-b">B</span><span class="l-b-text">${t.layer_b.slice(0,100)}</span></div>` : '',
    t.layer_c ? `<div class="theme-layer"><span class="l-badge l-c">C</span><span class="l-c-text">${t.layer_c.slice(0,120)}</span></div>` : '',
  ].filter(Boolean).join('');

  const tlItems = timeline.map(e => `
    <div class="tl-item">
      <span class="tl-time">${ago(e.happened_at)}</span>
      <div class="tl-dot ${dotCls(e.event_type)}"></div>
      <div class="tl-content">
        <div class="tl-title">${e.title}</div>
        ${e.description ? `<div class="tl-desc">${e.description.slice(0,120)}</div>` : ''}
      </div>
    </div>`).join('');

  return `
  <div class="theme-card status-${t.status}">
    <div class="theme-head">
      <div>
        <div class="theme-name">${t.name}</div>
        <div class="theme-layers">${layerRows}</div>
        <div class="theme-meta">
          <span class="status-badge sb-${t.status}">${t.status}</span>
          <span class="theme-date">created ${ago(t.created_at)}</span>
          ${invested ? `<span class="mono text2">$${invested.toLocaleString()} invested</span>` : ''}
          ${totalPnl ? `<span class="pnl ${pnlCls}">${fmt$(totalPnl)}</span>` : ''}
        </div>
      </div>
      <div class="conviction-block">
        <div class="conviction-num" style="color:${convCls}">${Math.round(t.conviction)}</div>
        <div class="conviction-lbl">conviction</div>
        <div class="conv-bar"><div class="conv-fill" style="width:${t.conviction}%;background:${convCls}"></div></div>
      </div>
    </div>

    ${positions.length ? `
    <div class="positions-section">
      <div class="positions-header" onclick="togglePos(${t.id})">
        <div class="pos-summary">
          <span>Positions</span>
          <span class="pos-count">${positions.length} ticker${positions.length>1?'s':''}</span>
          ${unreal ? `<span class="pnl ${unreal>=0?'pos':'neg'}">${fmt$(unreal)} unrealized</span>` : ''}
        </div>
        <span id="pos-icon-${t.id}" style="font-size:10px">▾</span>
      </div>
      <div class="positions-body" id="pos-body-${t.id}">
        <table class="pos-table">
          <thead><tr>
            <th>Ticker</th><th>Layer</th><th>Status</th><th>Shares</th>
            <th>Avg Entry</th><th>Current</th><th>P&L</th><th>Invested</th><th>Thesis</th>
          </tr></thead>
          <tbody>${positions.map(posRow).join('')}</tbody>
        </table>
      </div>
    </div>` : ''}

    ${timeline.length ? `
    <div class="timeline-section">
      <div style="font-size:10px;text-transform:uppercase;color:var(--text3);letter-spacing:.7px;margin-bottom:10px">Timeline</div>
      <div class="timeline-list">${tlItems}</div>
    </div>` : ''}
  </div>`;
}

function togglePos(id) {
  const body = document.getElementById(`pos-body-${id}`);
  const icon = document.getElementById(`pos-icon-${id}`);
  body.classList.toggle('open');
  icon.textContent = body.classList.contains('open') ? '▴' : '▾';
}

async function load() {
  const [themes, summary] = await Promise.all([
    fetch('/api/plays/themes').then(r => r.json()),
    fetch('/api/plays/summary').then(r => r.json()),
  ]);

  // Stats
  const uPnl = summary.total_unrealized || 0;
  const rPnl = summary.total_realized || 0;
  document.getElementById('s-themes').textContent    = summary.active_themes || 0;
  document.getElementById('s-positions').textContent = summary.open_positions || 0;
  document.getElementById('s-invested').textContent  = summary.total_invested ? '$'+Math.round(summary.total_invested).toLocaleString() : '$0';

  const uEl = document.getElementById('s-unrealized');
  uEl.textContent = fmt$(uPnl);
  uEl.className = 'stat-val ' + (uPnl >= 0 ? 'pos' : 'neg');

  const rEl = document.getElementById('s-realized');
  rEl.textContent = fmt$(rPnl);
  rEl.className = 'stat-val ' + (rPnl >= 0 ? 'pos' : 'neg');

  // Themes
  const el = document.getElementById('themes-list');
  if (!themes.length) {
    el.innerHTML = '<div class="empty"><h3>No themes yet</h3><p>Click "+ New Theme" to track your first macro play</p></div>';
  } else {
    el.innerHTML = themes.map(themeCard).join('');
  }

  document.getElementById('last-update').textContent = `Updated ${new Date().toLocaleTimeString()}`;
}

async function refreshPrices() {
  await fetch('/api/plays/refresh-prices', {method:'POST'});
  load();
}

// Modal
function showAddTheme() {
  document.getElementById('modal-overlay').style.display = 'flex';
}
function hideModal() {
  document.getElementById('modal-overlay').style.display = 'none';
}
async function createTheme() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) return;
  const body = {
    name,
    layer_a: document.getElementById('f-a').value.trim(),
    layer_b: document.getElementById('f-b').value.trim(),
    layer_c: document.getElementById('f-c').value.trim(),
  };
  await fetch('/api/plays/create-theme', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body),
  });
  hideModal();
  load();
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) hideModal();
});

load();
setInterval(load, 60000);
</script>
</body>
</html>
