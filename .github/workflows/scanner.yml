name: Alpha Hunter Scanner

on:
  schedule:
    # Run 4x per day: pre-market, mid-day, close, after-hours
    - cron: "0 12 * * 1-5"   # 7am ET (pre-market)
    - cron: "0 17 * * 1-5"   # 12pm ET (mid-day)
    - cron: "0 21 * * 1-5"   # 4pm ET (close)
    - cron: "0 1  * * 2-6"   # 8pm ET (after-hours digest)
  workflow_dispatch:           # Manual trigger from GitHub UI
    inputs:
      ticker:
        description: "Single ticker to scan (optional)"
        required: false
      dry_run:
        description: "Dry run (no alerts)"
        type: boolean
        default: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write config
        run: |
          cat > config.yaml << EOF
          telegram:
            bot_token: "${{ secrets.TELEGRAM_BOT_TOKEN }}"
            chat_id: "${{ secrets.TELEGRAM_CHAT_ID }}"
          brave:
            api_key: "${{ secrets.BRAVE_API_KEY }}"
          anthropic:
            api_key: "${{ secrets.ANTHROPIC_API_KEY }}"
          scanner:
            interval_hours: 6
            conviction_threshold: 65
            universe:
              - sp500
              - commodities
              - watchlist
            price_min: 1.0
            price_max: 500.0
            market_cap_min: 50
            market_cap_max: 10000
          signals:
            price_vs_52w_low: 20
            volume_anomaly: 25
            short_interest: 15
            insider_activity: 20
            news_sentiment: 10
            social_momentum: 10
          storage:
            db_path: "data/alpha_hunter.db"
            history_days: 90
          EOF

      - name: Run scanner
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.ticker }}" ]; then
            ARGS="$ARGS --ticker ${{ github.event.inputs.ticker }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python main.py $ARGS

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-results-${{ github.run_id }}
          path: data/
          retention-days: 30
